name: Lint

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  awesome-lint:
    name: awesome-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install and run awesome-lint
        run: |
          npm install -g awesome-lint
          awesome-lint

  link-check:
    name: Link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: markdown-link-check
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: "yes"
          use-verbose-mode: "yes"
          config-file: ".github/markdown-link-check.json"

  badge-check:
    name: Every entry has a badge
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Grep for bare entries in README
        run: |
          # An entry is a bullet of the form: - **[name](path/to/page.md)** — pitch
          # Navigation bullets that link to a directory (no .md) are not entries.
          bad=$(grep -nE '^\s*-\s+\*\*\[[^]]+\]\([^)]+\.md\)\*\*' README.md \
            | grep -vE '\[(paper|provider-doc|tested|vetted-tool|sourced)\]' \
            || true)
          if [ -n "$bad" ]; then
            echo "Found bare entries in README.md (no recognized badge):"
            echo "$bad"
            exit 1
          fi
          echo "All README entries carry a valid badge."
